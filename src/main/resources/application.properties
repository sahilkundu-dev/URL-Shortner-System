# ── Application ───────────────────────────────────────────────────
spring.application.name=url-shortener

# ── MySQL ─────────────────────────────────────────────────────────
# ${VAR:default} means: use environment variable VAR,
# or fall back to 'default' if not set (local development)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/urlshortener?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Redis ─────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Base URL ──────────────────────────────────────────────────────
# Locally: http://localhost:8080
# On Railway: https://your-app-name.up.railway.app
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ── Swagger / OpenAPI ─────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ── Logging ───────────────────────────────────────────────────────
# Quieter in production — show-sql=false above keeps DB logs clean
logging.level.com.sahil=INFO

# ── Actuator ──────────────────────────────────────────────────────
# Expose health, info, and metrics endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# App info shown at /actuator/info
info.app.name=URL Shortener
info.app.description=Production-grade URL Shortening Service
info.app.version=1.0.0
info.app.java-version=21
info.app.spring-boot-version=3.5.14
info.app.github=https://github.com/sahilkundu-dev/URL-Shortner-System
info.app.live-url=https://url-shortner-system-production.up.railway.app
info.app.swagger-ui=https://url-shortner-system-production.up.railway.app/swagger-ui/swagger-ui/index.html

# Move actuator to a non-standard path (security by obscurity + clear namespace)
management.endpoints.web.base-path=/actuator

management.info.env.enabled=true

# Disable sensitive endpoints entirely
management.endpoint.env.enabled=false
management.endpoint.beans.enabled=false
management.endpoint.shutdown.enabled=false
management.endpoint.threaddump.enabled=false
management.endpoint.heapdump.enabled=false