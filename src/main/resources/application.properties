# ── Application ───────────────────────────────────────────────────
spring.application.name=url-shortener

# ── MySQL ─────────────────────────────────────────────────────────
# ${VAR:default} means: use environment variable VAR,
# or fall back to 'default' if not set (local development)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/urlshortener?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Redis ─────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Base URL ──────────────────────────────────────────────────────
# Locally: http://localhost:8080
# On Railway: https://your-app-name.up.railway.app
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ── Swagger / OpenAPI ─────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ── Logging ───────────────────────────────────────────────────────
# Quieter in production — show-sql=false above keeps DB logs clean
logging.level.com.sahil=INFO